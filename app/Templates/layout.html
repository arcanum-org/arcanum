<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ yield 'title' }} — Arcanum</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Lora:wght@600&display=swap" rel="stylesheet">

    {{! App::cssTags() !}}

    <!-- Syntax highlighting — highlight.js with Arcanum-branded theme -->
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <style>
        /* Arcanum syntax theme — warm tones on parchment */
        .hljs {
            background: transparent;
            color: #3d3a34;
        }
        .hljs-keyword,
        .hljs-built_in,
        .hljs-type { color: #b5623f; }
        .hljs-string,
        .hljs-regexp { color: #4a7c59; }
        .hljs-comment,
        .hljs-quote { color: #9c9789; font-style: italic; }
        .hljs-number,
        .hljs-literal { color: #b8862e; }
        .hljs-variable,
        .hljs-template-variable,
        .hljs-attr { color: #2c2a25; }
        .hljs-title,
        .hljs-title\.class_,
        .hljs-title\.function_ { color: #4a6fa5; }
        .hljs-meta,
        .hljs-meta .hljs-keyword { color: #b8862e; }
        .hljs-symbol,
        .hljs-bullet { color: #b5623f; }
        .hljs-tag { color: #6b675e; }
        .hljs-name { color: #b5623f; }
        .hljs-attribute { color: #4a6fa5; }
        .hljs-selector-class,
        .hljs-selector-id { color: #b5623f; }
        .hljs-emphasis { font-style: italic; }
        .hljs-strong { font-weight: bold; }

        /* Dark mode overrides */
        .dark .hljs { color: #c4bfb3; }
        .dark .hljs-keyword,
        .dark .hljs-built_in,
        .dark .hljs-type { color: #c8795a; }
        .dark .hljs-string,
        .dark .hljs-regexp { color: #6a9c75; }
        .dark .hljs-comment,
        .dark .hljs-quote { color: #6b675e; }
        .dark .hljs-number,
        .dark .hljs-literal { color: #cfa04a; }
        .dark .hljs-variable,
        .dark .hljs-template-variable,
        .dark .hljs-attr { color: #e8e4db; }
        .dark .hljs-title,
        .dark .hljs-title\.class_,
        .dark .hljs-title\.function_ { color: #6a8fc0; }
        .dark .hljs-meta,
        .dark .hljs-meta .hljs-keyword { color: #cfa04a; }
        .dark .hljs-tag { color: #9c9789; }
        .dark .hljs-name { color: #c8795a; }
        .dark .hljs-attribute { color: #6a8fc0; }
        .dark .hljs-selector-class,
        .dark .hljs-selector-id { color: #c8795a; }
    </style>

    {{! Htmx::script() !}}
    <meta name="csrf-token" content="{{ Csrf::token() }}">
    {{! Htmx::csrf() !}}

    <!-- Dark mode toggle — persisted to localStorage -->
    <script>
    (function() {
        var stored = localStorage.getItem('arcanum-dark-mode');
        if (stored === 'true' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    function toggleDarkMode() {
        var isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('arcanum-dark-mode', isDark);
    }
    </script>
</head>
<body class="min-h-screen dark:bg-deep-parchment dark:text-[#e8e4db]">
    {{ include 'partials/nav' }}

    <main class="max-w-layout mx-auto px-6 md:px-12 py-12">
        {{ yield 'content' }}
    </main>

    {{ include 'partials/footer' }}
</body>
</html>
