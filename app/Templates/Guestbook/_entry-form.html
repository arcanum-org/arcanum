<form
    id="guestbook-form"
    hx-post="/guestbook/add-entry"
    hx-swap="outerMorph"
    hx-on:guestbook:entry:added="this.reset()"
    class="flex flex-col gap-3 mb-6"
>
    {{ csrf }}
    {{ if isset($errors) && $errors }}
    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded p-3">
        <ul class="m-0 p-0 list-none text-sm text-red-700 dark:text-red-400">
            {{ foreach $errors as $field => $messages }}
                {{ foreach $messages as $msg }}
                <li>{{ $msg }}</li>
                {{ endforeach }}
            {{ endforeach }}
        </ul>
    </div>
    {{ endif }}
    <div class="flex gap-3">
        <input
            type="text"
            name="name"
            placeholder="Your name"
            required
            class="flex-1 bg-parchment dark:bg-deep-parchment border border-light-sand dark:border-dark-sand rounded px-3 py-2 text-sm text-ink dark:text-[#e8e4db] placeholder-stone"
        >
        <button
            type="submit"
            class="bg-copper text-parchment px-4 py-2 rounded text-sm font-medium hover:bg-copper-dark"
        >Sign</button>
    </div>
    <textarea
        name="message"
        placeholder="Leave a message..."
        required
        rows="2"
        class="bg-parchment dark:bg-deep-parchment border border-light-sand dark:border-dark-sand rounded px-3 py-2 text-sm text-ink dark:text-[#e8e4db] placeholder-stone resize-none"
    ></textarea>
</form>
