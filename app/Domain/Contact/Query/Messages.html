{{ if(count($messages) > 0) }}
<h2 class="font-heading text-xl font-semibold text-ink dark:text-[#e8e4db] m-0 mb-4">
    Messages
</h2>
<div class="space-y-4">
    {{ foreach($messages as $row) }}
    <div class="bg-vellum dark:bg-dark-vellum border border-light-sand dark:border-dark-sand rounded-lg p-6">
        <div class="flex items-baseline justify-between mb-2">
            <p class="text-sm font-medium text-charcoal dark:text-[#c4bfb3] m-0">{{ $row['name'] }}</p>
            <p class="text-xs text-stone m-0">{{ $row['email'] }}</p>
        </div>
        <p class="text-warm-gray dark:text-stone text-sm m-0 leading-relaxed">{{ $row['message'] }}</p>
    </div>
    {{ endforeach }}
</div>
{{ else }}
<p class="text-stone text-sm m-0">No messages yet.</p>
{{ endif }}
